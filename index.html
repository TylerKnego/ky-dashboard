<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f4f5f7;color:#1a1a1a}
.hdr{background:#1a1a1a;color:#fff;padding:14px 24px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.htitle{font-size:16px;font-weight:500}
.hmeta{font-size:12px;color:#aaa;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.sdot{width:8px;height:8px;border-radius:50%;background:#888;display:inline-block;margin-right:5px;vertical-align:middle}
.sdot.live{background:#4CAF50}.sdot.err{background:#e53935}
.body{max-width:1100px;margin:0 auto;padding:20px 16px}
.ss{background:#fff;border-radius:10px;margin-bottom:20px;overflow:hidden;border:0.5px solid #e0e0e0}
.sh{padding:12px 18px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.sn{font-size:15px;font-weight:500;color:#fff;min-width:110px}
.trow{display:flex;gap:4px;flex-wrap:wrap}
.tbtn{padding:4px 10px;border-radius:6px;border:0.5px solid rgba(255,255,255,.4);font-size:11px;cursor:pointer;background:rgba(255,255,255,.12);color:rgba(255,255,255,.85)}
.tbtn.on{background:rgba(255,255,255,.92);color:#1a1a1a;font-weight:500}
.vp{padding:18px}
.cg{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:9px;margin-bottom:14px}
.mc{background:#f7f8fa;border-radius:8px;padding:11px 13px}
.ml{font-size:11px;color:#666;margin-bottom:2px}
.mv{font-size:18px;font-weight:500;color:#1a1a1a}
.ms{font-size:11px;color:#999;margin-top:2px}
.mv.pos{color:#2E7D42}.mv.neg{color:#C62828}
.pw{height:5px;background:#e5e5e5;border-radius:3px;overflow:hidden;margin-top:4px}
.pf{height:100%;border-radius:3px}
.cc{position:relative;width:100%;height:190px;margin-bottom:14px}
.dt{width:100%;border-collapse:collapse;font-size:12px}
.dt th{padding:7px 9px;font-size:11px;font-weight:600;color:#666;border-bottom:1px solid #eee;background:#fafafa;text-align:left}
.dt td{padding:6px 9px;border-bottom:0.5px solid #f0f0f0;color:#333}
.dt tr:last-child td{border-bottom:none}
.dt tr:hover td{background:#f9f9f9}
.pos{color:#2E7D42;font-weight:500}.neg{color:#C62828;font-weight:500}
@media(max-width:580px){.cg{grid-template-columns:repeat(2,1fr)}}
</style>

var MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
var ACC={IT:'#2E7D42',LEX:'#1565C0',HB:'#D05000'};
var LGT={IT:'rgba(46,125,66,.18)',LEX:'rgba(21,101,192,.18)',HB:'rgba(208,80,0,.18)'};
var STORES=[{k:'IT',n:'Indian Trail',c:'#1E5C2E'},{k:'LEX',n:'Lexington',c:'#0D3B7A'},{k:'HB',n:'Hurstbourne',c:'#8B3A0A'}];
var DIVS=['total','Builder','Retail','Property Management','Wholesale','Commercial'];
var DLBLS={total:'All divisions',Builder:'Builder',Retail:'Retail','Property Management':'Prop. Mgmt',Wholesale:'Wholesale',Commercial:'Commercial'};
var db={},charts={};

function fmt(n){return n==null?'--':'$'+Math.round(n).toLocaleString();}
function fmtP(n){return n==null?'--':(n*100).toFixed(1)+'%';}

function init(){
  document.getElementById('sdot').className='sdot';
  document.getElementById('slbl').textContent='loading...';
  fetch(SB_URL+'/rest/v1/sales_actuals?select=store,type,division,month_index,sales,margin&limit=2000',{
    headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Accept':'application/json'}
  }).then(function(r){
    if(!r.ok)throw new Error('HTTP '+r.status);
    return r.json();
  }).then(function(rows){
    db={};
    (rows||[]).forEach(function(row){
      if(!db[row.store])db[row.store]={};
      if(!db[row.store][row.type])db[row.store][row.type]={};
      if(!db[row.store][row.type][row.division])db[row.store][row.type][row.division]={sales:Array(12).fill(null),margin:Array(12).fill(null)};
      db[row.store][row.type][row.division].sales[row.month_index]=row.sales;
      db[row.store][row.type][row.division].margin[row.month_index]=row.margin;
    });
    document.getElementById('sdot').className='sdot live';
    document.getElementById('slbl').textContent='live';
    document.getElementById('updated').textContent='Updated '+new Date().toLocaleString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
    buildUI();
  }).catch(function(e){
    document.getElementById('sdot').className='sdot err';
    document.getElementById('slbl').textContent='error: '+e.message;
    document.getElementById('body').innerHTML='<div style="padding:40px;text-align:center;color:#e53935;font-size:14px">Failed to load data: '+e.message+'</div>';
  });
}

function buildUI(){
  var body=document.getElementById('body');
  body.innerHTML='';
  STORES.forEach(function(s){
    var sec=document.createElement('div');
    sec.className='ss';sec.id='s'+s.k;
    var divBtns=DIVS.map(function(d){
      return '<button class="tbtn '+(d==='total'?'on':'')+'" onclick="setDiv(\''+s.k+'\',\''+d+'\',this)">'+DLBLS[d]+'</button>';
    }).join('');
    sec.innerHTML='<div class="sh" style="background:'+s.c+'">'
      +'<span class="sn">'+s.n+'</span>'
      +'<div class="trow"><button class="tbtn on" onclick="setType(\''+s.k+'\',\'written\',this)">Written</button>'
      +'<button class="tbtn" onclick="setType(\''+s.k+'\',\'closed\',this)">Closed</button></div>'
      +'<div class="trow" id="db'+s.k+'">'+divBtns+'</div></div>'
      +'<div class="vp" id="vp'+s.k+'"></div>';
    body.appendChild(sec);
    renderStore(s.k,'written','total');
  });
}

function renderStore(sk,type,div){
  var bud=(BUDGET[sk]&&BUDGET[sk][type]&&BUDGET[sk][type][div])||BUDGET[sk][type].total;
  var act=(db[sk]&&db[sk][type]&&db[sk][type][div])||{sales:Array(12).fill(null),margin:Array(12).fill(null)};
  var acc=ACC[sk],lgt=LGT[sk];
  var aS=0,bS=0,aM=0,bM=0,filled=0;
  for(var i=0;i<12;i++){
    bS+=bud.sales[i]||0;bM+=bud.margin[i]||0;
    if(act.sales[i]!=null){aS+=act.sales[i];filled++;}
    if(act.margin[i]!=null)aM+=act.margin[i];
  }
  var pace=filled>0?aS/filled*12:0;
  var pct=bS>0?Math.min(100,aS/bS*100):0;
  var aMp=aS>0?aM/aS:null,bMp=bS>0?bM/bS:null;
  var mpC=aMp!=null&&bMp!=null?(aMp>=bMp?'pos':'neg'):'';
  var prC=filled>0?(pace>=bS?'pos':'neg'):'';
  var cid='c'+sk+type+div.replace(/ /g,'');
  var rows='';
  for(var i=0;i<12;i++){
    var sv=act.sales[i],mv=act.margin[i],bs=bud.sales[i]||0;
    var diff=sv!=null?sv-bs:null;
    var mp=sv&&sv>0&&mv!=null?mv/sv:null;
    rows+='<tr><td>'+MONTHS[i]+'</td><td>'+fmt(bs)+'</td>'
      +'<td style="font-weight:500">'+fmt(sv)+'</td>'
      +'<td class="'+(diff!=null?(diff>=0?'pos':'neg'):'')+'">'+(diff!=null?((diff>=0?'+':'')+fmt(diff)):'--')+'</td>'
      +'<td>'+fmt(mv)+'</td><td>'+fmtP(mp)+'</td></tr>';
  }
  var vp=document.getElementById('vp'+sk);
  vp.innerHTML='<div class="cg">'
    +'<div class="mc"><div class="ml">Actual sales YTD</div><div class="mv">'+fmt(aS)+'</div>'
    +'<div class="ms">Budget: '+fmt(bS)+'</div>'
    +'<div class="pw"><div class="pf" style="width:'+pct.toFixed(1)+'%;background:'+acc+'"></div></div>'
    +'<div class="ms" style="margin-top:3px">'+pct.toFixed(1)+'% of budget</div></div>'
    +'<div class="mc"><div class="ml">Margin YTD</div><div class="mv">'+fmt(aM)+'</div><div class="ms">Budget: '+fmt(bM)+'</div></div>'
    +'<div class="mc"><div class="ml">Margin %</div><div class="mv '+mpC+'">'+fmtP(aMp)+'</div><div class="ms">Budget: '+fmtP(bMp)+'</div></div>'
    +'<div class="mc"><div class="ml">Run-rate</div><div class="mv '+prC+'">'+(filled>0?fmt(pace):'--')+'</div><div class="ms">'+filled+' months entered</div></div>'
    +'</div>'
    +'<div class="cc"><canvas id="'+cid+'"></canvas></div>'
    +'<table class="dt"><thead><tr><th>Month</th><th>Budget</th><th>Actual</th><th>vs Budget</th><th>Margin $</th><th>Margin %</th></tr></thead>'
    +'<tbody>'+rows+'</tbody></table>';
  if(charts[cid])charts[cid].destroy();
  charts[cid]=new Chart(document.getElementById(cid).getContext('2d'),{
    type:'bar',
    data:{labels:MONTHS,datasets:[
      {label:'Budget',data:bud.sales,backgroundColor:'rgba(130,130,130,.18)',borderColor:'rgba(130,130,130,.4)',borderWidth:1,borderRadius:3},
      {label:'Actual',data:MONTHS.map(function(_,i){return act.sales[i];}),backgroundColor:lgt,borderColor:acc,borderWidth:1.5,borderRadius:3}
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:function(c){return ' '+c.dataset.label+': '+(c.raw!=null?'$'+Math.round(c.raw).toLocaleString():'--');}}}},
      scales:{
        x:{grid:{display:false},ticks:{font:{size:11},autoSkip:false}},
        y:{grid:{color:'rgba(0,0,0,.05)'},ticks:{font:{size:11},callback:function(v){return v>=1e6?'$'+(v/1e6).toFixed(1)+'M':v>=1000?'$'+(v/1000).toFixed(0)+'k':'$'+v;}}}
      }
    }
  });
}

function setType(sk,type,el){
  var divEl=document.querySelector('#db'+sk+' .on');
  var div='total';
  if(divEl){var m=divEl.getAttribute('onclick').match(/'([^']+)',\s*this/);if(m)div=m[1];}
  el.closest('.trow').querySelectorAll('.tbtn').forEach(function(b){b.classList.remove('on');});
  el.classList.add('on');
  renderStore(sk,type,div);
}

function setDiv(sk,div,el){
  var typeEl=document.querySelector('#s'+sk+' .sh .trow .on');
  var type='written';
  if(typeEl){var m=typeEl.getAttribute('onclick').match(/'([^']+)',\s*this/);if(m)type=m[1];}
  el.closest('.trow').querySelectorAll('.tbtn').forEach(function(b){b.classList.remove('on');});
  el.classList.add('on');
  renderStore(sk,type,div);
}

init();
setInterval(init,60000);
</script>
